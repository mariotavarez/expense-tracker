<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
    </style>

    <!-- Clip paths -->
    <clipPath id="browser-clip">
      <rect x="40" y="40" width="1120" height="640" rx="12"/>
    </clipPath>

    <!-- Animations -->
    <!-- Stat cards fade in sequentially -->
    <style>
      .stat-card-1 { animation: fadeSlideIn 0.5s ease 0.3s both; }
      .stat-card-2 { animation: fadeSlideIn 0.5s ease 0.5s both; }
      .stat-card-3 { animation: fadeSlideIn 0.5s ease 0.7s both; }
      .chart-group { animation: fadeSlideIn 0.6s ease 0.9s both; }
      .expense-1 { animation: fadeSlideIn 0.4s ease 1.1s both; }
      .expense-2 { animation: fadeSlideIn 0.4s ease 1.25s both; }
      .expense-3 { animation: fadeSlideIn 0.4s ease 1.4s both; }
      .expense-4 { animation: fadeSlideIn 0.4s ease 1.55s both; }
      .expense-5 { animation: fadeSlideIn 0.4s ease 1.7s both; }
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .donut-path { animation: drawDonut 1.4s ease 0.9s both; transform-origin: 210px 420px; }
      @keyframes drawDonut {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
      }
    </style>

    <!-- Drop shadow filter -->
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <!-- Browser chrome background -->
  <rect x="40" y="40" width="1120" height="640" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Browser toolbar -->
  <rect x="40" y="40" width="1120" height="44" rx="12" fill="#f8f8f8"/>
  <rect x="40" y="72" width="1120" height="12" fill="#f8f8f8"/>
  <line x1="40" y1="84" x2="1160" y2="84" stroke="#ebebeb" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="70" cy="62" r="6" fill="#ff5f57"/>
  <circle cx="90" cy="62" r="6" fill="#febc2e"/>
  <circle cx="110" cy="62" r="6" fill="#28c840"/>

  <!-- URL bar -->
  <rect x="300" y="50" width="540" height="24" rx="6" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="570" y="66" text-anchor="middle" font-size="11" fill="#808080">localhost:5173 — Spendr</text>

  <!-- === APP CONTENT === -->
  <!-- Nav header -->
  <rect x="40" y="84" width="1120" height="48" fill="rgba(255,255,255,0.95)"/>
  <line x1="40" y1="132" x2="1160" y2="132" stroke="#ebebeb" stroke-width="1"/>

  <!-- Logo -->
  <rect x="68" y="96" width="24" height="24" rx="5" fill="#171717"/>
  <text x="80" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">S</text>
  <text x="100" y="113" font-size="14" font-weight="700" fill="#171717" letter-spacing="-0.8">Spendr</text>

  <!-- Nav tabs -->
  <rect x="420" y="96" width="74" height="24" rx="5" fill="#f5f5f5"/>
  <text x="457" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#171717">Overview</text>
  <text x="540" y="112" text-anchor="middle" font-size="12" fill="#666">Transactions</text>
  <text x="620" y="112" text-anchor="middle" font-size="12" fill="#666">Charts</text>
  <text x="688" y="112" text-anchor="middle" font-size="12" fill="#666">Budgets</text>

  <!-- Add button -->
  <rect x="1060" y="96" width="68" height="26" rx="5" fill="#171717"/>
  <text x="1094" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="white">+ Add</text>

  <!-- === MAIN CONTENT === -->

  <!-- Page heading -->
  <text x="68" y="172" font-size="26" font-weight="700" fill="#171717" letter-spacing="-1.3">April Overview</text>
  <text x="68" y="192" font-size="12" fill="#808080">Track your spending and stay on budget.</text>

  <!-- ===== STAT CARDS ===== -->

  <!-- Card 1: Expenses -->
  <g class="stat-card-1">
    <rect x="68" y="204" width="228" height="96" rx="8" fill="white" filter="url(#card-shadow)"/>
    <rect x="68" y="204" width="228" height="96" rx="8" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <text x="84" y="222" font-size="11" font-weight="500" fill="#666">Expenses This Month</text>
    <!-- Red icon bg -->
    <rect x="270" y="214" width="20" height="20" rx="4" fill="rgba(255,91,79,0.08)"/>
    <line x1="273" y1="225" x2="280" y2="221" stroke="#ff5b4f" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="280" y1="221" x2="287" y2="226" stroke="#ff5b4f" stroke-width="1.5" stroke-linecap="round"/>
    <text x="84" y="258" font-size="24" font-weight="700" fill="#171717" letter-spacing="-1.2">$2,181</text>
    <!-- Trend badge -->
    <rect x="84" y="268" width="48" height="18" rx="3" fill="rgba(255,91,79,0.1)"/>
    <text x="108" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#ff5b4f">↓ 12.0%</text>
    <text x="138" y="280" font-size="10" fill="#808080">vs last month</text>
  </g>

  <!-- Card 2: Income -->
  <g class="stat-card-2">
    <rect x="308" y="204" width="228" height="96" rx="8" fill="white" filter="url(#card-shadow)"/>
    <rect x="308" y="204" width="228" height="96" rx="8" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <text x="324" y="222" font-size="11" font-weight="500" fill="#666">Income This Month</text>
    <rect x="510" y="214" width="20" height="20" rx="4" fill="rgba(10,114,239,0.08)"/>
    <text x="520" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#0a72ef">$</text>
    <text x="324" y="258" font-size="24" font-weight="700" fill="#171717" letter-spacing="-1.2">$4,850</text>
    <text x="324" y="280" font-size="10" fill="#808080">April</text>
  </g>

  <!-- Card 3: Net Balance -->
  <g class="stat-card-3">
    <rect x="548" y="204" width="228" height="96" rx="8" fill="white" filter="url(#card-shadow)"/>
    <rect x="548" y="204" width="228" height="96" rx="8" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <text x="564" y="222" font-size="11" font-weight="500" fill="#666">Net Balance</text>
    <rect x="750" y="214" width="20" height="20" rx="4" fill="rgba(22,163,74,0.08)"/>
    <text x="760" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">W</text>
    <text x="564" y="258" font-size="24" font-weight="700" fill="#171717" letter-spacing="-1.2">$2,669</text>
    <text x="564" y="280" font-size="10" fill="#16a34a">surplus</text>
  </g>

  <!-- Card 4: Top Category -->
  <g class="stat-card-3">
    <rect x="788" y="204" width="228" height="96" rx="8" fill="white" filter="url(#card-shadow)"/>
    <rect x="788" y="204" width="228" height="96" rx="8" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <text x="804" y="222" font-size="11" font-weight="500" fill="#666">Top Category</text>
    <text x="804" y="258" font-size="24" font-weight="700" fill="#171717" letter-spacing="-1.2">🏠 Housing</text>
    <text x="804" y="280" font-size="10" fill="#808080">$1,800.00</text>
  </g>

  <!-- ===== DONUT CHART ===== -->
  <g class="chart-group">
    <rect x="68" y="316" width="348" height="320" rx="8" fill="white" filter="url(#card-shadow)"/>
    <rect x="68" y="316" width="348" height="320" rx="8" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <text x="88" y="340" font-size="13" font-weight="600" fill="#171717" letter-spacing="-0.4">Category Breakdown</text>
    <text x="88" y="355" font-size="11" fill="#808080">Spending distribution this period</text>

    <!-- Donut chart (approximate) -->
    <g class="donut-path" transform="translate(242, 455)">
      <!-- Housing 35% — green -->
      <path d="M 0 -80 A 80 80 0 0 1 74.5 -29.1 L 46.6 -18.2 A 50 50 0 0 0 0 -50 Z" fill="#10b981"/>
      <!-- Food 28% — orange -->
      <path d="M 74.5 -29.1 A 80 80 0 0 1 41.2 70.1 L 25.8 43.8 A 50 50 0 0 0 46.6 -18.2 Z" fill="#f97316"/>
      <!-- Transport 14% — blue -->
      <path d="M 41.2 70.1 A 80 80 0 0 1 -41.2 70.1 L -25.8 43.8 A 50 50 0 0 0 25.8 43.8 Z" fill="#3b82f6"/>
      <!-- Entertainment — purple -->
      <path d="M -41.2 70.1 A 80 80 0 0 1 -77.0 -22.3 L -48.1 -13.9 A 50 50 0 0 0 -25.8 43.8 Z" fill="#8b5cf6"/>
      <!-- Other — gray -->
      <path d="M -77.0 -22.3 A 80 80 0 0 1 0 -80 L 0 -50 A 50 50 0 0 0 -48.1 -13.9 Z" fill="#6b7280"/>
      <!-- Center hole -->
      <circle r="50" fill="white"/>
      <text x="0" y="-8" text-anchor="middle" font-size="16" font-weight="700" fill="#171717">$2,181</text>
      <text x="0" y="10" text-anchor="middle" font-size="10" fill="#808080">total spent</text>
    </g>

    <!-- Legend -->
    <rect x="88" y="556" width="8" height="8" rx="2" fill="#10b981"/>
    <text x="100" y="564" font-size="11" fill="#4d4d4d">Housing</text>
    <text x="175" y="564" font-size="11" font-weight="600" fill="#171717">$1,800</text>
    <text x="220" y="564" font-size="11" fill="#808080">35%</text>

    <rect x="88" y="572" width="8" height="8" rx="2" fill="#f97316"/>
    <text x="100" y="580" font-size="11" fill="#4d4d4d">Food</text>
    <text x="175" y="580" font-size="11" font-weight="600" fill="#171717">$609</text>
    <text x="220" y="580" font-size="11" fill="#808080">28%</text>

    <rect x="88" y="588" width="8" height="8" rx="2" fill="#3b82f6"/>
    <text x="100" y="596" font-size="11" fill="#4d4d4d">Transport</text>
    <text x="175" y="596" font-size="11" font-weight="600" fill="#171717">$305</text>
    <text x="220" y="596" font-size="11" fill="#808080">14%</text>

    <rect x="248" y="556" width="8" height="8" rx="2" fill="#8b5cf6"/>
    <text x="260" y="564" font-size="11" fill="#4d4d4d">Entertainment</text>
    <text x="370" y="564" font-size="11" fill="#808080">10%</text>

    <rect x="248" y="572" width="8" height="8" rx="2" fill="#6b7280"/>
    <text x="260" y="580" font-size="11" fill="#4d4d4d">Other</text>
    <text x="370" y="580" font-size="11" fill="#808080">13%</text>
  </g>

  <!-- ===== MONTHLY BAR CHART ===== -->
  <g class="chart-group">
    <rect x="432" y="316" width="400" height="320" rx="8" fill="white" filter="url(#card-shadow)"/>
    <rect x="432" y="316" width="400" height="320" rx="8" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <text x="452" y="340" font-size="13" font-weight="600" fill="#171717" letter-spacing="-0.4">Monthly Overview</text>
    <text x="452" y="355" font-size="11" fill="#808080">Income vs expenses — last 6 months</text>

    <!-- Grid lines -->
    <line x1="452" y1="580" x2="812" y2="580" stroke="#ebebeb" stroke-width="1"/>
    <line x1="452" y1="543" x2="812" y2="543" stroke="#ebebeb" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="452" y1="506" x2="812" y2="506" stroke="#ebebeb" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="452" y1="469" x2="812" y2="469" stroke="#ebebeb" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="452" y1="432" x2="812" y2="432" stroke="#ebebeb" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="452" y1="395" x2="812" y2="395" stroke="#ebebeb" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Y axis labels -->
    <text x="447" y="584" text-anchor="end" font-size="9" fill="#808080">$0</text>
    <text x="447" y="547" text-anchor="end" font-size="9" fill="#808080">$1k</text>
    <text x="447" y="510" text-anchor="end" font-size="9" fill="#808080">$2k</text>
    <text x="447" y="473" text-anchor="end" font-size="9" fill="#808080">$3k</text>
    <text x="447" y="436" text-anchor="end" font-size="9" fill="#808080">$4k</text>

    <!-- Bars for 6 months: Nov, Dec, Jan, Feb, Mar, Apr -->
    <!-- Income bars (blue) and Expense bars (red) side by side -->
    <!-- Nov -->
    <rect x="463" y="502" width="18" height="78" rx="2" fill="#0a72ef" opacity="0.85"/>
    <rect x="483" y="515" width="18" height="65" rx="2" fill="#ff5b4f" opacity="0.85"/>
    <!-- Dec -->
    <rect x="517" y="506" width="18" height="74" rx="2" fill="#0a72ef" opacity="0.85"/>
    <rect x="537" y="520" width="18" height="60" rx="2" fill="#ff5b4f" opacity="0.85"/>
    <!-- Jan -->
    <rect x="571" y="504" width="18" height="76" rx="2" fill="#0a72ef" opacity="0.85"/>
    <rect x="591" y="523" width="18" height="57" rx="2" fill="#ff5b4f" opacity="0.85"/>
    <!-- Feb -->
    <rect x="625" y="501" width="18" height="79" rx="2" fill="#0a72ef" opacity="0.85"/>
    <rect x="645" y="517" width="18" height="63" rx="2" fill="#ff5b4f" opacity="0.85"/>
    <!-- Mar -->
    <rect x="679" y="503" width="18" height="77" rx="2" fill="#0a72ef" opacity="0.85"/>
    <rect x="699" y="516" width="18" height="64" rx="2" fill="#ff5b4f" opacity="0.85"/>
    <!-- Apr (current) -->
    <rect x="733" y="498" width="18" height="82" rx="2" fill="#0a72ef"/>
    <rect x="753" y="521" width="18" height="59" rx="2" fill="#ff5b4f"/>

    <!-- X axis labels -->
    <text x="480" y="596" text-anchor="middle" font-size="10" fill="#808080">Nov</text>
    <text x="534" y="596" text-anchor="middle" font-size="10" fill="#808080">Dec</text>
    <text x="588" y="596" text-anchor="middle" font-size="10" fill="#808080">Jan</text>
    <text x="642" y="596" text-anchor="middle" font-size="10" fill="#808080">Feb</text>
    <text x="696" y="596" text-anchor="middle" font-size="10" fill="#808080">Mar</text>
    <text x="750" y="596" text-anchor="middle" font-size="10" fill="#808080" font-weight="600">Apr</text>

    <!-- Legend -->
    <rect x="686" y="362" width="8" height="8" rx="2" fill="#0a72ef"/>
    <text x="698" y="370" font-size="10" fill="#666">Income</text>
    <rect x="738" y="362" width="8" height="8" rx="2" fill="#ff5b4f"/>
    <text x="750" y="370" font-size="10" fill="#666">Expenses</text>
  </g>

  <!-- ===== TRANSACTION LIST ===== -->
  <g>
    <rect x="848" y="316" width="296" height="320" rx="8" fill="white" filter="url(#card-shadow)"/>
    <rect x="848" y="316" width="296" height="320" rx="8" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <text x="866" y="340" font-size="13" font-weight="600" fill="#171717" letter-spacing="-0.4">Transactions</text>
    <rect x="1082" y="329" width="46" height="18" rx="4" fill="#f5f5f5"/>
    <text x="1105" y="341" text-anchor="middle" font-size="10" fill="#808080">12 items</text>
    <line x1="848" y1="352" x2="1144" y2="352" stroke="#ebebeb" stroke-width="1"/>

    <!-- Transaction rows -->
    <!-- Row 1 -->
    <g class="expense-1">
      <rect x="866" y="366" width="28" height="28" rx="7" fill="#fff7ed"/>
      <text x="880" y="384" text-anchor="middle" font-size="14">🍕</text>
      <text x="904" y="378" font-size="12" font-weight="500" fill="#171717">Whole Foods</text>
      <text x="904" y="392" font-size="10" fill="#808080">Apr 14 · Food</text>
      <text x="1128" y="380" text-anchor="end" font-size="12" font-weight="600" fill="#ff5b4f">-$127.50</text>
    </g>

    <!-- Row 2 -->
    <g class="expense-2">
      <rect x="866" y="406" width="28" height="28" rx="7" fill="#eff6ff"/>
      <text x="880" y="424" text-anchor="middle" font-size="14">🚗</text>
      <text x="904" y="418" font-size="12" font-weight="500" fill="#171717">Uber to airport</text>
      <text x="904" y="432" font-size="10" fill="#808080">Apr 13 · Transport</text>
      <text x="1128" y="420" text-anchor="end" font-size="12" font-weight="600" fill="#ff5b4f">-$42.00</text>
    </g>

    <!-- Row 3: Income -->
    <g class="expense-3">
      <rect x="866" y="446" width="28" height="28" rx="7" fill="#f0fdf4"/>
      <text x="880" y="464" text-anchor="middle" font-size="14">💰</text>
      <text x="904" y="458" font-size="12" font-weight="500" fill="#171717">Monthly salary</text>
      <text x="904" y="472" font-size="10" fill="#808080">Apr 14 · Income</text>
      <text x="1128" y="460" text-anchor="end" font-size="12" font-weight="600" fill="#0a72ef">+$4,200</text>
    </g>

    <!-- Row 4 -->
    <g class="expense-4">
      <rect x="866" y="486" width="28" height="28" rx="7" fill="#fdf2f8"/>
      <text x="880" y="504" text-anchor="middle" font-size="14">🛍</text>
      <text x="904" y="498" font-size="12" font-weight="500" fill="#171717">ASOS order</text>
      <text x="904" y="512" font-size="10" fill="#808080">Apr 12 · Shopping</text>
      <text x="1128" y="500" text-anchor="end" font-size="12" font-weight="600" fill="#ff5b4f">-$89.00</text>
    </g>

    <!-- Row 5 -->
    <g class="expense-5">
      <rect x="866" y="526" width="28" height="28" rx="7" fill="#ecfdf5"/>
      <text x="880" y="544" text-anchor="middle" font-size="14">🏠</text>
      <text x="904" y="538" font-size="12" font-weight="500" fill="#171717">Rent payment</text>
      <text x="904" y="552" font-size="10" fill="#808080">Apr 11 · Housing</text>
      <text x="1128" y="540" text-anchor="end" font-size="12" font-weight="600" fill="#ff5b4f">-$1,800</text>
    </g>

    <!-- Row 6 — blurred/faded to indicate more below -->
    <g opacity="0.35">
      <rect x="866" y="566" width="28" height="28" rx="7" fill="#fef2f2"/>
      <text x="880" y="584" text-anchor="middle" font-size="14">💊</text>
      <text x="904" y="578" font-size="12" font-weight="500" fill="#171717">Pharmacy</text>
      <text x="904" y="592" font-size="10" fill="#808080">Apr 10 · Health</text>
      <text x="1128" y="580" text-anchor="end" font-size="12" font-weight="600" fill="#ff5b4f">-$34.50</text>
    </g>

    <!-- Fade overlay at bottom of list -->
    <defs>
      <linearGradient id="list-fade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="white" stop-opacity="0"/>
        <stop offset="100%" stop-color="white" stop-opacity="1"/>
      </linearGradient>
    </defs>
    <rect x="848" y="600" width="296" height="36" fill="url(#list-fade)"/>
  </g>
</svg>
